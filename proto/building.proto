syntax = "proto3";
import "resource.proto";
import "tile.proto";
package game_proto;
message Building {
  uint32 id = 1;
  string name = 2;
  repeated int32 tile_rows = 3;
  repeated int32 tile_cols = 4;
  Resource yield_per_turn = 5;
  Resource construction_cost = 6;
  repeated TerrainType allowed_terrains = 7;
  string model_key = 8;
  uint32 faction_id = 9;
  bool under_construction = 10;
}
