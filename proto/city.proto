syntax = "proto3";
package game_proto;

enum BuildOrderType {
  BUILD_ORDER_BUILDING = 0;
  BUILD_ORDER_UNIT = 1;
}

message BuildQueueItem {
  string name = 1;
  int32 production_cost = 2;
  int32 target_row = 3;
  int32 target_col = 4;
  BuildOrderType order_type = 5;
  string template_key = 6;
}

message City {
  uint32 id = 1;
  string name = 2;
  int32 center_row = 3;
  int32 center_col = 4;
  int32 faction_id = 5;
  int32 population = 6;
  repeated int32 tile_rows = 7;
  repeated int32 tile_cols = 8;
  repeated BuildQueueItem build_queue_items = 9;
  int32 accumulated_production = 10;
  int32 food_surplus = 11;
}
