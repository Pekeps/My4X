name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev libprotobuf-dev protobuf-compiler libgrpc++-dev protobuf-compiler-grpc

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-windows-protobuf-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install protobuf

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: BUILD_TYPE=Release make build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build build

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifact/my4x-linux
          cp build/app/my4x_app artifact/my4x-linux/
          [ -d assets ] && cp -r assets artifact/my4x-linux/ || true

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force artifact/my4x-windows
          Copy-Item build/app/my4x_app.exe artifact/my4x-windows/
          if (Test-Path assets) { Copy-Item -Recurse assets artifact/my4x-windows/ }
          # Bundle vcpkg DLLs the exe depends on
          Get-ChildItem C:/vcpkg/installed/x64-windows/bin/*.dll | Copy-Item -Destination artifact/my4x-windows/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my4x-${{ matrix.os }}
          path: artifact/

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev libprotobuf-dev protobuf-compiler libgrpc++-dev protobuf-compiler-grpc
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-tidy-18 clang-format-18

      - name: Check formatting
        run: make format-check

      - name: Run clang-tidy
        run: make lint
